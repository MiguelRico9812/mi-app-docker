<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Aplicación</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 30px;
    }

    button {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 15px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #0072ff, #00c6ff);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Mi Aplicación Web</h1>

    <button onclick="location.href='registro.html'">
      📋 Registro
    </button>

    <button onclick="location.href='busqueda.html'">
      🔍 Búsqueda
    </button>

    <button onclick="location.href='bienvenida.html'">
      🎉 Bienvenida
    </button>
  </div>

</body>
</html>
