<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Búsqueda</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Buscar</h2>

    <input type="text" id="busqueda" placeholder="Escribe algo">

    <br>
    <button onclick="buscar()">Buscar</button>

    <p id="resultado"></p>

    <a href="index.html">Volver</a>
  </div>

  <script>
    function buscar() {
      let texto = document.getElementById("busqueda").value;
      document.getElementById("resultado").innerText =
        "Búsqueda exitosa 🔍: " + texto;
    }
  </script>

</body>
</html>
