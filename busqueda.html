<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Búsqueda</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  animation: fadeIn 1s ease;
}

input {
  padding: 10px;
  width: 200px;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

#resultado {
  margin-top: 15px;
}

a {
  display: block;
  margin-top: 15px;
  color: white;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}
</style>

</head>
<body>

<div class="card">
  <h2>🔍 Buscar</h2>

  <input type="text" id="busqueda" placeholder="Escribe algo">

  <br>
  <button onclick="buscar()">Buscar</button>

  <p id="resultado"></p>

  <a href="index.html">Volver</a>
</div>

<script>
function buscar() {
  let texto = document.getElementById("busqueda").value;

  if(texto === "") {
    document.getElementById("resultado").innerText = "Escribe algo primero";
  } else {
    document.getElementById("resultado").innerText =
      "Resultado encontrado: " + texto;
  }
}
</script>

</body>
</html>
