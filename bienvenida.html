<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenida</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #00c9ff, #92fe9d);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

h1 {
  color: #333;
}

a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: #00c9ff;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  transition: 0.3s;
}

a:hover {
  background: #0072ff;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}
</style>

</head>
<body>

<div class="card">
  <h1>🎉 ¡Bienvenido!</h1>
  <p>Tu acceso fue exitoso</p>
  <a href="index.html">Volver</a>
</div>

</body>
</html>

</body>
</html>
