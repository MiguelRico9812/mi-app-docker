<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #ff7e5f;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Registro</h2>

    <input type="text" placeholder="Nombre">
    <input type="email" placeholder="Correo">

    <button onclick="alert('Registro exitoso ✅')">
      Registrarse
    </button>

    <br><br>
    <a href="index.html">Volver</a>
  </div>

</body>
</html>
